<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion des retards etudiants</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape shape-a" aria-hidden="true"></div>
  <div class="bg-shape shape-b" aria-hidden="true"></div>

  <main class="container py-4 py-lg-5">
    <header class="hero p-4 p-lg-5 mb-4 reveal">
      <p class="hero-kicker mb-2">Formation Med5 Sale</p>
      <h1 class="mb-2">Gestion des retards des etudiants</h1>
      <p class="hero-subtitle mb-0">Regle de calcul: <strong>1 minute de retard = 1 Dirham</strong></p>
    </header>

    <section class="row g-4 mb-4">
      <div class="col-12 col-lg-6 reveal delay-1">
        <article class="card shadow-sm border-0 h-100">
          <div class="card-body">
            <h2 id="student-title" class="h4 mb-3">Fiche etudiant</h2>
            <form id="student-form" class="row g-3">
              <div class="col-12">
                <label for="nom" class="form-label">Nom</label>
                <input id="nom" name="nom" type="text" class="form-control" required maxlength="40" placeholder="Ex: El Alaoui" />
              </div>
              <div class="col-12">
                <label for="prenom" class="form-label">Prenom</label>
                <input id="prenom" name="prenom" type="text" class="form-control" required maxlength="40" placeholder="Ex: Yassine" />
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary w-100">Ajouter etudiant</button>
              </div>
            </form>
            <p id="student-feedback" class="feedback mt-2 mb-0" aria-live="polite"></p>
          </div>
        </article>
      </div>

      <div class="col-12 col-lg-6 reveal delay-2">
        <article class="card shadow-sm border-0 h-100">
          <div class="card-body">
            <h2 id="retard-title" class="h4 mb-3">Saisie des retards (minutes)</h2>
            <form id="retard-form" class="row g-3">
              <div class="col-12">
                <label for="student-select" class="form-label">Etudiant</label>
                <select id="student-select" class="form-select" required>
                  <option value="">Selectionner un etudiant</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="minutes" class="form-label">Retard (min)</label>
                <input id="minutes" type="number" class="form-control" min="1" step="1" required placeholder="Ex: 12" />
              </div>
              <div class="col-md-6">
                <label for="retard-date" class="form-label">Date</label>
                <input id="retard-date" type="date" class="form-control" required />
              </div>
              <div class="col-12">
                <label for="note" class="form-label">Note</label>
                <input id="note" type="text" class="form-control" maxlength="80" placeholder="Optionnel" />
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-success w-100">Enregistrer retard</button>
              </div>
            </form>
            <p id="retard-feedback" class="feedback mt-2 mb-0" aria-live="polite"></p>
          </div>
        </article>
      </div>
    </section>

    <section class="card shadow-sm border-0 reveal delay-3 mb-4">
      <div class="card-body">
        <h2 id="dashboard-title" class="h4 mb-3">Tableau de bord</h2>
        <div class="stats mb-3" id="stats"></div>

        <div class="table-responsive mb-3">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Nom</th>
                <th>Prenom</th>
                <th>Nb retards</th>
                <th>Total min</th>
                <th>Montant (DH)</th>
              </tr>
            </thead>
            <tbody id="student-summary-body"></tbody>
          </table>
        </div>

        <h3 class="h5 mb-2">Visualisation rapide</h3>
        <div id="bars" class="bars"></div>
      </div>
    </section>

    <section class="card shadow-sm border-0 reveal delay-4">
      <div class="card-body">
        <h2 id="history-title" class="h4 mb-3">Historique des retards</h2>
        <div class="table-responsive">
          <table class="table table-striped align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Date</th>
                <th>Etudiant</th>
                <th>Minutes</th>
                <th>Montant (DH)</th>
                <th>Note</th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
